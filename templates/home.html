<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HematoVision</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
        }

        /* LEFT SIDE (30%) */
        .left {
            width: 30%;
            background: url('{{ url_for("static", filename="bg4.jpg") }}') no-repeat center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* DARK OVERLAY */
        .left::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
        }

        /* TITLE */
        .left h1 {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 40px;
            font-weight: 700;
            letter-spacing: 3px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.7);
            z-index: 2;
        }

        /* GLASS CARD */
        .card {
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 260px;
        }

        input[type="file"] {
            margin: 15px 0;
            color: white;
        }

        button {
            background: #ff3b5c;
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #ff1f4b;
        }

        /* RIGHT SIDE (70%) */
        .right {
            width: 70%;
            background: url('{{ url_for("static", filename="bg1.jpg") }}') no-repeat center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 80px;
            color: white;
        }

        /* TEXT CONTENT */
        .content {
            max-width: 600px;
        }

        .content h1 {
            font-size: 52px;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        }

        .content p {
            font-size: 18px;
            line-height: 1.7;
            opacity: 0.9;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        }
    </style>
</head>

<body>

    <!-- LEFT PANEL -->
    <div class="left">
        <h1>HematoVision</h1>

        <div class="card">
            <form action="/" method="POST" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <br>
                <button type="submit">Predict</button>
            </form>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
        <div class="content">
            <h1>AI Powered Blood Cell Detection</h1>
            <p>
                Upload microscopic blood cell images and get instant classification using deep learning.
                Fast, accurate, and designed for real-world usage.
            </p>
        </div>
    </div>

</body>
</html>
